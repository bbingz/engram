name: Engram

options:
  bundleIdPrefix: com.engram
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultLocalization: en

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: 6.0.0
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird
    majorVersion: 2.0.0
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    majorVersion: 1.0.0

targets:
  Engram:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Engram
      - path: Shared
    resources:
      - path: Engram/Resources/Assets.xcassets
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Hummingbird
        product: Hummingbird
    prebuildScripts:
      - name: Bundle Node.js Daemon
        script: "${SRCROOT}/scripts/build-node-bundle.sh"
        outputFiles:
          - $(DERIVED_FILE_DIR)/node-bundle.stamp
        runForInstallBuildsOnly: false
        basedOnDependencyAnalysis: false
    postbuildScripts:
      - name: Replace AppIcon.icns with complete version
        script: |
          # Xcode only generates icns with 16+128 sizes; replace with our pre-built complete icns
          ICNS_SRC="${SRCROOT}/Engram/Resources/AppIcon.icns"
          ICNS_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/AppIcon.icns"
          if [ -f "$ICNS_SRC" ]; then
            cp "$ICNS_SRC" "$ICNS_DST"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: Engram/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Engram
        NSPrincipalClass: NSApplication
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.app
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: J25GS8J4XM
      CODE_SIGN_ENTITLEMENTS: Engram/Engram.entitlements

  EngramCLI:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramCLI
      - path: Shared
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.cli
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"

  EngramTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramTests
      - path: test-fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Engram
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Engram.app/Contents/MacOS/Engram"
      BUNDLE_LOADER: "$(TEST_HOST)"

  EngramUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: EngramUITests
        excludes:
          - "baselines/**"
      - path: ../test-fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Engram
    settings:
      TEST_TARGET_NAME: Engram
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSPrincipalClass: ScreenshotTestObserver
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  Engram:
    build:
      targets:
        Engram: all
        EngramCLI: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EngramTests
        - EngramUITests
      environmentVariables: []
