name: Engram

options:
  bundleIdPrefix: com.engram
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultLocalization: en

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: 6.0.0
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird
    majorVersion: 2.0.0
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    majorVersion: 1.0.0

targets:
  Engram:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Engram
      - path: Shared
    dependencies:
      - package: GRDB
        product: GRDB
      - package: Hummingbird
        product: Hummingbird
    prebuildScripts:
      - name: Bundle Node.js Daemon
        script: "${SRCROOT}/scripts/build-node-bundle.sh"
        outputFiles:
          - $(DERIVED_FILE_DIR)/node-bundle.stamp
        runForInstallBuildsOnly: false
        basedOnDependencyAnalysis: false
    info:
      path: Engram/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Engram
        NSPrincipalClass: NSApplication
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.app
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"

  EngramCLI:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramCLI
      - path: Shared
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.cli
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
