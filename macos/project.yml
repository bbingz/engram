name: Engram

options:
  bundleIdPrefix: com.engram
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultLocalization: en

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    majorVersion: 6.0.0
  Hummingbird:
    url: https://github.com/hummingbird-project/hummingbird
    majorVersion: 2.0.0
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    majorVersion: 1.0.0

targets:
  EngramCoreRead:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramCoreRead
      - path: Shared/EngramCore
      - path: Shared/MCP
    dependencies:
      - package: GRDB
        product: GRDB-dynamic
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.core-read
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"

  EngramCoreWrite:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramCoreWrite
    dependencies:
      - target: EngramCoreRead
      - package: GRDB
        product: GRDB-dynamic
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.core-write
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"

  EngramCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramCoreTests
      - path: ../tests/fixtures
        type: folder
        buildPhase: resources
        createIntermediateGroups: false
    dependencies:
      - target: EngramCoreRead
      - target: EngramCoreWrite
      - package: GRDB
        product: GRDB-dynamic
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"

  EngramCoreSchemaTool:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramCoreSchemaTool
    dependencies:
      - target: EngramCoreWrite
      - package: GRDB
        product: GRDB-dynamic
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.core-schema-tool
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"
      # Finds the shared GRDB-dynamic framework next to the built executable.
      LD_RUNPATH_SEARCH_PATHS:
        - "@executable_path"
        - "@executable_path/../Frameworks"

  EngramServiceCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramService/Core
      - path: EngramService/IPC
      - path: Shared/Service
    dependencies:
      - target: EngramCoreWrite
      - package: GRDB
        product: GRDB-dynamic
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.service-core
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"

  EngramServiceCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramServiceCoreTests
    dependencies:
      - target: EngramServiceCore
      - target: EngramCoreRead
      - target: EngramCoreWrite
      - package: GRDB
        product: GRDB-dynamic
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"

  EngramService:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramService/main.swift
    dependencies:
      - target: EngramServiceCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.service
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"
      SKIP_INSTALL: YES

  Engram:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Engram
      - path: Shared
    resources:
      - path: Engram/Resources/Assets.xcassets
    dependencies:
      - package: GRDB
        product: GRDB-dynamic
      - sdk: AppIntents.framework
      - target: EngramMCP
        link: false
        embed: false
      - target: EngramCLI
        link: false
        embed: false
      - target: EngramService
        link: false
        embed: false
    postbuildScripts:
      - name: Bundle EngramCLI helper
        script: "${SRCROOT}/scripts/copy-cli-helper.sh"
        basedOnDependencyAnalysis: false
      - name: Bundle EngramMCP helper
        script: "${SRCROOT}/scripts/copy-mcp-helper.sh"
        basedOnDependencyAnalysis: false
      - name: Bundle EngramService helper
        script: "${SRCROOT}/scripts/copy-service-helper.sh"
        basedOnDependencyAnalysis: false
      - name: Replace AppIcon.icns with complete version
        script: |
          # Xcode only generates icns with 16+128 sizes; replace with our pre-built complete icns
          ICNS_SRC="${SRCROOT}/Engram/Resources/AppIcon.icns"
          ICNS_DST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/AppIcon.icns"
          if [ -f "$ICNS_SRC" ]; then
            cp "$ICNS_SRC" "$ICNS_DST"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: Engram/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.developer-tools
        CFBundleDisplayName: Engram
        NSPrincipalClass: NSApplication
        NSAppleEventsUsageDescription: "Engram opens resume commands in Terminal or iTerm when you choose those terminal targets."
        # Single-sourced from the MARKETING_VERSION / CURRENT_PROJECT_VERSION build
        # settings above. xcodegen writes these substitution tokens into Info.plist
        # so there is exactly one version source (project.yml).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.app
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: J25GS8J4XM
      CODE_SIGN_ENTITLEMENTS: Engram/Engram.entitlements
      # Notarization requires Hardened Runtime on the distributed (Developer ID) app.
      ENABLE_HARDENED_RUNTIME: YES
      # Single-sourced version. project.yml is the source of truth; build-release.sh
      # reads MARKETING_VERSION from here and auto-injects a non-default CURRENT_PROJECT_VERSION.
      MARKETING_VERSION: "1.0.5"
      CURRENT_PROJECT_VERSION: "1"

  EngramCLI:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramCLI
      - path: Shared/Service
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.cli
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      SKIP_INSTALL: YES

  EngramMCP:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramMCP
      - path: Shared
    dependencies:
      - package: GRDB
        product: GRDB-dynamic
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.mcp
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      SKIP_INSTALL: YES
      # GRDB is now the shared GRDB-dynamic framework (one copy per process to
      # avoid the SchedulingWatchdog cross-talk crash). As a bundled helper this
      # tool finds it in Contents/Frameworks; standalone/test builds find it
      # next to the executable in BUILT_PRODUCTS_DIR.
      LD_RUNPATH_SEARCH_PATHS:
        - "@executable_path"
        - "@executable_path/../Frameworks"

  # Self-hosted remote offload server. A dumb content-addressed blob store with
  # bearer auth + AES-GCM at-rest encryption (server-held key). NEVER bundled in
  # Engram.app — it is deployed separately (e.g. on a Mac mini / private host).
  EngramRemoteServerCore:
    type: framework.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramRemoteServer/Core
      - path: Shared/EngramCore/ArchiveV2/ArchiveHash.swift
      - path: Shared/EngramCore/ArchiveV2/ArchiveCanonicalJSON.swift
      - path: Shared/EngramCore/ArchiveV2/ArchiveModels.swift
      - path: Shared/EngramCore/ArchiveV2/ArchiveRemoteTelemetry.swift
    dependencies:
      - package: Hummingbird
        product: Hummingbird
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.remote-server-core
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"

  EngramRemoteServer:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramRemoteServer/main.swift
    dependencies:
      - target: EngramRemoteServerCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.engram.remote-server
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"
      SKIP_INSTALL: YES

  EngramRemoteServerCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramRemoteServerCoreTests
    dependencies:
      - target: EngramRemoteServerCore
      - target: EngramCoreWrite
      - package: GRDB
        product: GRDB-dynamic
      - package: Hummingbird
        product: Hummingbird
      - package: Hummingbird
        product: HummingbirdTesting
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: "-"

  EngramTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramTests
      - path: test-fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Engram
      - package: GRDB
        product: GRDB-dynamic
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      DEVELOPMENT_TEAM: J25GS8J4XM
      CODE_SIGN_STYLE: Automatic
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Engram.app/Contents/MacOS/Engram"
      BUNDLE_LOADER: "$(TEST_HOST)"

  EngramMCPTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: EngramMCPTests
      - path: ../tests/fixtures
        type: folder
        buildPhase: resources
        createIntermediateGroups: false
    dependencies:
      - target: EngramMCP
      # Hybrid parity vs SQLiteEngramServiceReadProvider.search on the same fixture.
      - target: EngramServiceCore
      - target: EngramCoreWrite
      - target: EngramCoreRead
      - package: GRDB
        product: GRDB-dynamic
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES

  EngramUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: EngramUITests
        excludes:
          - "baselines/**"
      # Bundle the macOS fixture DB (test-index.sqlite + sessions/) so
      # TestLaunchConfig.fixtureDBPath resolves to a real bundled path and the
      # launched app loads seeded sessions. Must be `test-fixtures` (the dir the
      # lookup expects), not `../tests/fixtures` (repo-root TS fixtures, no DB).
      - path: test-fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Engram
    settings:
      TEST_TARGET_NAME: Engram
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSPrincipalClass: ScreenshotTestObserver
      DEVELOPMENT_TEAM: J25GS8J4XM
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      SWIFT_VERSION: "5.9"
      MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  Engram:
    build:
      targets:
        Engram: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EngramCoreTests
        - EngramTests
        - EngramUITests
      environmentVariables:
        ENGRAM_PERF: "$(TEST_RUNNER_ENGRAM_PERF)"
  EngramTests:
    build:
      targets:
        Engram: all
        EngramTests: all
    test:
      config: Debug
      targets:
        - EngramTests
  EngramUITests:
    build:
      targets:
        Engram: all
        EngramUITests: all
    test:
      config: Debug
      targets:
        - EngramUITests
  EngramCLI:
    build:
      targets:
        EngramCLI: all
    run:
      config: Debug
  EngramMCP:
    build:
      targets:
        EngramMCP: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EngramMCPTests
  EngramService:
    build:
      targets:
        EngramService: all
    run:
      config: Debug
  EngramServiceCore:
    build:
      targets:
        EngramServiceCore: all
        EngramServiceCoreTests: all
    test:
      config: Debug
      targets:
        - EngramServiceCoreTests
  EngramMCPTests:
    build:
      targets:
        EngramMCP: all
        EngramMCPTests: all
    test:
      config: Debug
      targets:
        - EngramMCPTests
  EngramCoreTests:
    build:
      targets:
        EngramCoreRead: all
        EngramCoreWrite: all
        EngramCoreTests: all
    test:
      config: Debug
      targets:
        - EngramCoreTests
      environmentVariables:
        ENGRAM_PERF: "$(TEST_RUNNER_ENGRAM_PERF)"
  EngramCoreSchemaTool:
    build:
      targets:
        EngramCoreSchemaTool: all
    run:
      config: Debug
  EngramRemoteServer:
    build:
      targets:
        EngramRemoteServer: all
    run:
      config: Debug
  EngramRemoteServerCore:
    build:
      targets:
        EngramRemoteServerCore: all
        EngramRemoteServerCoreTests: all
    test:
      config: Debug
      targets:
        - EngramRemoteServerCoreTests
