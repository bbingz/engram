name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  XCODEGEN_VERSION: "2.45.4"

jobs:
  lint:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: ONNXRUNTIME_NODE_INSTALL=skip npm ci
      - run: npm run lint

  dead-code:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: ONNXRUNTIME_NODE_INSTALL=skip npm ci
      - run: npm run build
      - run: npm run knip

  security-audit:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: ONNXRUNTIME_NODE_INSTALL=skip npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: ${{ github.event_name == 'pull_request' }}

  typescript:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: ONNXRUNTIME_NODE_INSTALL=skip npm ci
      - name: Install archive safety gate tools
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            install_root="$RUNNER_TEMP/ripgrep"
            rm -rf "$install_root"
            mkdir -p "$install_root"
            (
              cd "$install_root"
              apt-get download ripgrep
              dpkg-deb --extract ripgrep_*.deb root
            )
            echo "$install_root/root/usr/bin" >> "$GITHUB_PATH"
          fi
      - run: npm run build
      - run: npm run typecheck:test
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/

  macos-vitest:
    runs-on: [self-hosted, macOS, macmini-m1, lite]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: |
          brew install xcodegen ripgrep
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"
      - name: Check archive v2 no-delete boundary
        run: bash scripts/check-archive-v2-safety.sh
      - run: npm test -- tests/scripts/build-release-script.test.ts tests/scripts/remote-server-package.test.ts tests/scripts/swift-boundary-scripts.test.ts tests/scripts/product-boundary-scripts.test.ts tests/scripts/archive-v2-safety-gate.test.ts tests/scripts/plist-gate.test.ts tests/scripts/invariants-ledger.test.ts tests/scripts/swift-conventions.test.ts tests/scripts/version-guard.test.ts

  swift-unit:
    runs-on: [self-hosted, macOS, macmini-m1, xcode]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Homebrew (xcodegen)
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Cache SPM packages
        uses: actions/cache@v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ hashFiles('macos/project.yml', 'macos/Package.resolved') }}
          restore-keys: spm-

      - name: Generate Xcode project
        run: |
          cd macos
          xcodegen generate
          git diff --exit-code Engram.xcodeproj/project.pbxproj

      - name: Generate test fixtures
        run: |
          npm ci
          npm run build
          npm run generate:fixtures

      - name: Run Swift unit tests
        run: |
          cd macos

          run_xcode_tests() {
            local scheme="$1"
            shift
            local log="xcodebuild-${scheme}.log"
            xcodebuild test \
              -project Engram.xcodeproj \
              -scheme "$scheme" \
              -destination 'platform=macOS' \
              -enableCodeCoverage "${ENGRAM_CODE_COVERAGE:-YES}" \
              CODE_SIGNING_ALLOWED=NO \
              "$@" \
              2>&1 | tee "$log"
            grep -Fq '** TEST SUCCEEDED **' "$log"
          }

          run_xcode_tests Engram -skip-testing:EngramUITests
          ENGRAM_APP="$(
            find "$HOME/Library/Developer/Xcode/DerivedData" -path '*/Build/Products/Debug/Engram.app' -type d -print0 |
              while IFS= read -r -d '' app; do
                stat -f '%m %N' "$app"
              done |
              sort -rn |
              head -n 1 |
              cut -d' ' -f2-
          )"
          if [ -z "$ENGRAM_APP" ] || [ ! -d "$ENGRAM_APP" ]; then
            echo "Debug Engram.app not found under Xcode DerivedData" >&2
            exit 1
          fi
          bash scripts/release-verify.sh "$ENGRAM_APP" --hygiene-only
          run_xcode_tests EngramServiceCore
          run_xcode_tests EngramMCPTests

  remote-server-swift:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Run remote server unit tests
        run: |
          cd macos
          xcodebuild test \
            -project Engram.xcodeproj \
            -scheme EngramRemoteServerCore \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/engram-remote-tests-derived" \
            -enableCodeCoverage NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release remote server package
        run: |
          set -euo pipefail
          umask 077
          cd macos

          REMOTE_DERIVED_DATA="$RUNNER_TEMP/engram-remote-derived"
          REMOTE_PACKAGE="$RUNNER_TEMP/engram-remote-package"
          KEYGEN_HOME="$RUNNER_TEMP/engram-remote-keygen-home"
          KEYGEN_OUTPUT="$RUNNER_TEMP/engram-remote-keygen.txt"
          test ! -e "$REMOTE_PACKAGE"

          xcodebuild build \
            -project Engram.xcodeproj \
            -scheme EngramRemoteServer \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$REMOTE_DERIVED_DATA" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

          bash scripts/package-remote-server.sh \
            --derived-data "$REMOTE_DERIVED_DATA" \
            --configuration Release \
            --arch arm64 \
            --source-revision "$GITHUB_SHA" \
            --output "$REMOTE_PACKAGE"
          NO_XCODE_PATH="$RUNNER_TEMP/engram-remote-no-xcode"
          mkdir -m 0700 "$NO_XCODE_PATH"
          ln -s /usr/bin/false "$NO_XCODE_PATH/xcrun"
          PATH="$NO_XCODE_PATH:$PATH" \
            /bin/bash scripts/package-remote-server.sh --verify-only "$REMOTE_PACKAGE"

          mkdir -m 0700 "$KEYGEN_HOME"
          trap 'rm -f "$KEYGEN_OUTPUT"' EXIT
          env -i \
            HOME="$KEYGEN_HOME" \
            PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            "$REMOTE_PACKAGE/bin/EngramRemoteServer" keygen > "$KEYGEN_OUTPUT"
          test "$(
            /usr/bin/openssl base64 -d -A < "$KEYGEN_OUTPUT" |
              /usr/bin/wc -c |
              /usr/bin/tr -d '[:space:]'
          )" = 32

  fixture-check:
    runs-on: [self-hosted, macOS, macmini-m1, lite]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check fixture schema version
        run: npm exec -- tsx scripts/check-fixture-schema.ts
      - name: Check adapter parity fixture freshness
        run: npm run check:adapter-parity-fixtures
      - name: Verify fixture determinism
        run: |
          test -f test-fixtures/test-index.sqlite || (echo "ERROR: fixture not committed" && exit 1)
          npm run generate:fixtures
          git diff --exit-code test-fixtures/test-index.sqlite

  ui-test-smoke:
    runs-on: [self-hosted, macOS, macmini-m1, xcode]
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    needs: [typescript, swift-unit]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Set screenshots dir
        run: echo "SCREENSHOTS_DIR=$RUNNER_TEMP/screenshots" >> "$GITHUB_ENV"
      - name: Install Git LFS
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install git-lfs
          git lfs version
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/cache@v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ hashFiles('macos/project.yml', 'macos/Package.resolved') }}
          restore-keys: spm-
      - run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"
      - run: cd macos && xcodegen generate
      - run: npm run generate:fixtures
      - name: Dismiss macOS setup assistant
        run: |
          osascript -e 'tell application id "com.apple.SetupAssistant" to quit' || true
          pkill -x "Setup Assistant" || true
      - name: Run UI smoke tests
        run: |
          xcodebuild test \
            -project macos/Engram.xcodeproj \
            -scheme Engram \
            -only-testing:EngramUITests/HomeSmokeTests \
            -only-testing:EngramUITests/SessionsSmokeTests \
            -only-testing:EngramUITests/SessionDetailSmokeTests \
            -only-testing:EngramUITests/SearchSmokeTests \
            -only-testing:EngramUITests/NavigationSmokeTests \
            -only-testing:EngramUITests/PopoverSmokeTests \
            -only-testing:EngramUITests/ActivitySmokeTests \
            -destination 'platform=macOS' \
            -resultBundlePath ${{ runner.temp }}/ui-test-results \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM=""
      - name: Collect screenshots from sandbox
        if: always()
        run: |
          # XCUITest runner writes to sandbox temp dir — find and copy to known location
          SANDBOX_DIR="$HOME/Library/Containers/com.engram.EngramUITests.xctrunner/Data/tmp/engram-screenshots"
          mkdir -p "$SCREENSHOTS_DIR"
          if [ -d "$SANDBOX_DIR" ]; then
            cp -R "$SANDBOX_DIR"/* "$SCREENSHOTS_DIR"/ 2>/dev/null || true
          fi
      - name: Compare screenshots
        if: always()
        env:
          SCREENSHOTS_DIR: ${{ runner.temp }}/screenshots
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          SCREENSHOT_REQUIRE_MANIFEST: "1"
          SCREENSHOT_FAIL_ON_SIZE_MISMATCH: "1"
        run: npx tsx scripts/screenshot-compare.ts
      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-diffs
          path: |
            ${{ runner.temp }}/screenshots/*.png
            ${{ runner.temp }}/screenshots/diffs/
            ${{ runner.temp }}/screenshots/comparison-report.json
          retention-days: 14
      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reportPath = `${process.env.SCREENSHOTS_DIR}/comparison-report.json`;
            if (!fs.existsSync(reportPath)) return;
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const failures = report.results.filter(r => r.status !== 'passed');
            if (failures.length === 0) return;
            let body = `📸 **Screenshot Regression**: ${failures.length} failure(s)\n\n`;
            body += `| Screen | SSIM | Pixel Diff | AI | Status |\n|--------|------|------------|-----|--------|\n`;
            for (const f of failures) {
              let aiCol = '—';
              if (f.ai_triage) {
                const icon = f.ai_triage.verdict === 'acceptable' ? '✅' : f.ai_triage.verdict === 'regression' ? '❌' : '⚠️';
                aiCol = `${icon} ${f.ai_triage.verdict} (${f.ai_triage.confidence.toFixed(2)})`;
              }
              body += `| ${f.name} | ${f.metrics.ssim.toFixed(3)} | ${f.metrics.pixel_diff_percent.toFixed(2)}% | ${aiCol} | ❌ |\n`;
            }
            body += `\nView diff images in [artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  ui-test-full:
    runs-on: [self-hosted, macOS, macmini-m1, xcode]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    timeout-minutes: 20
    needs: [typescript, swift-unit]
    steps:
      - name: Set screenshots dir
        run: echo "SCREENSHOTS_DIR=$RUNNER_TEMP/screenshots" >> "$GITHUB_ENV"
      - name: Install Git LFS
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install git-lfs
          git lfs version
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/cache@v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ hashFiles('macos/project.yml', 'macos/Package.resolved') }}
          restore-keys: spm-
      - run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"
      - run: cd macos && xcodegen generate
      - run: npm run generate:fixtures
      - name: Dismiss macOS setup assistant
        run: |
          osascript -e 'tell application id "com.apple.SetupAssistant" to quit' || true
          pkill -x "Setup Assistant" || true
      - name: Run full UI test suite
        run: |
          xcodebuild test \
            -project macos/Engram.xcodeproj \
            -scheme Engram \
            -only-testing:EngramUITests \
            -destination 'platform=macOS' \
            -resultBundlePath ${{ runner.temp }}/ui-test-results \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM=""
      - name: Collect screenshots from sandbox
        if: always()
        run: |
          SANDBOX_DIR="$HOME/Library/Containers/com.engram.EngramUITests.xctrunner/Data/tmp/engram-screenshots"
          mkdir -p "$SCREENSHOTS_DIR"
          if [ -d "$SANDBOX_DIR" ]; then
            cp -R "$SANDBOX_DIR"/* "$SCREENSHOTS_DIR"/ 2>/dev/null || true
          fi
      - name: Compare screenshots
        if: always()
        env:
          SCREENSHOTS_DIR: ${{ runner.temp }}/screenshots
          SCREENSHOT_REQUIRE_MANIFEST: "1"
          SCREENSHOT_FAIL_ON_SIZE_MISMATCH: "1"
        run: npx tsx scripts/screenshot-compare.ts
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-diffs-full
          path: |
            ${{ runner.temp }}/screenshots/*.png
            ${{ runner.temp }}/screenshots/diffs/
            ${{ runner.temp }}/screenshots/comparison-report.json
          retention-days: 30
