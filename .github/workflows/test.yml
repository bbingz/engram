name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_LINUX_AMD64_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
  ACTIONLINT_VERSION: "1.7.12"
  XCODEGEN_VERSION: "2.45.4"

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      heavy: ${{ steps.classify.outputs.heavy }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: classify
        name: Detect durable-docs-only changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          heavy=true
          if [[ -n "$BASE_SHA" && ! "$BASE_SHA" =~ ^0+$ ]] &&
             git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            heavy=false
            while IFS= read -r path; do
              case "$path" in
                .memory|.memory/*|CHANGELOG.md|MEMO.md|docs/archive/*|docs/reviews/*|docs/roadmap.md|docs/TODO.md|docs/followups.md)
                  ;;
                *)
                  heavy=true
                  break
                  ;;
              esac
            done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          fi
          echo "heavy=$heavy" >> "$GITHUB_OUTPUT"

  typescript:
    name: Node quality and tests
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate GitHub Actions workflows
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl -fsSLo "$archive" "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "$ACTIONLINT_LINUX_AMD64_SHA256  $archive" | sha256sum --check -
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: ONNXRUNTIME_NODE_INSTALL=skip npm ci
      - name: Install archive safety gate tools
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
      - name: Build
        run: npm run build
      - name: Typecheck tests and scripts
        run: npm run typecheck:test
      - name: Lint
        run: npm run lint
      - name: Dead-code check
        run: npm run knip
      - name: Test with coverage
        run: npm run test:coverage
      - name: Dependency audit
        run: npm audit --audit-level=moderate
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  macos-vitest:
    name: macOS script and fixture gates
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: |
          brew install xcodegen ripgrep
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"
      - name: Check archive v2 no-delete boundary
        run: bash scripts/check-archive-v2-safety.sh
      - run: npm test -- tests/scripts/build-release-script.test.ts tests/scripts/remote-server-package.test.ts tests/scripts/swift-boundary-scripts.test.ts tests/scripts/product-boundary-scripts.test.ts tests/scripts/archive-v2-safety-gate.test.ts tests/scripts/plist-gate.test.ts tests/scripts/invariants-ledger.test.ts tests/scripts/swift-conventions.test.ts tests/scripts/version-guard.test.ts
      - name: Check fixture schema version
        run: npm exec -- tsx scripts/check-fixture-schema.ts
      - name: Check MCP contract fixture freshness
        run: npm run check:mcp-contract-fixtures
      - name: Check adapter parity fixture freshness
        run: npm run check:adapter-parity-fixtures
      - name: Verify fixture determinism
        run: |
          test -f test-fixtures/test-index.sqlite || (echo "ERROR: fixture not committed" && exit 1)
          npm run generate:fixtures
          git diff --exit-code test-fixtures/test-index.sqlite

  swift-unit:
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Homebrew (xcodegen)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Cache SPM packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-${{ hashFiles('macos/project.yml', 'macos/Engram.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-

      - name: Generate Xcode project
        run: |
          cd macos
          xcodegen generate
          git diff --exit-code Engram.xcodeproj

      - name: Generate test fixtures
        run: |
          npm ci
          npm run build
          npm run generate:fixtures

      - name: Run Swift unit tests
        run: |
          cd macos

          run_xcode_tests() {
            local scheme="$1"
            shift
            local log="xcodebuild-${scheme}.log"
            xcodebuild test \
              -project Engram.xcodeproj \
              -scheme "$scheme" \
              -destination 'platform=macOS' \
              -enableCodeCoverage "${ENGRAM_CODE_COVERAGE:-YES}" \
              CODE_SIGNING_ALLOWED=NO \
              "$@" \
              2>&1 | tee "$log"
            grep -Fq '** TEST SUCCEEDED **' "$log"
          }

          run_xcode_tests Engram -skip-testing:EngramUITests
          ENGRAM_APP="$(
            find "$HOME/Library/Developer/Xcode/DerivedData" -path '*/Build/Products/Debug/Engram.app' -type d -print0 |
              while IFS= read -r -d '' app; do
                stat -f '%m %N' "$app"
              done |
              sort -rn |
              head -n 1 |
              cut -d' ' -f2-
          )"
          if [ -z "$ENGRAM_APP" ] || [ ! -d "$ENGRAM_APP" ]; then
            echo "Debug Engram.app not found under Xcode DerivedData" >&2
            exit 1
          fi
          bash scripts/release-verify.sh "$ENGRAM_APP" --hygiene-only
          run_xcode_tests EngramServiceCore
          run_xcode_tests EngramMCPTests

  remote-server-swift:
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Run remote server unit tests
        run: |
          cd macos
          xcodebuild test \
            -project Engram.xcodeproj \
            -scheme EngramRemoteServerCore \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/engram-remote-tests-derived" \
            -enableCodeCoverage NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release remote server package
        run: |
          set -euo pipefail
          umask 077
          cd macos

          REMOTE_DERIVED_DATA="$RUNNER_TEMP/engram-remote-derived"
          REMOTE_PACKAGE="$RUNNER_TEMP/engram-remote-package"
          KEYGEN_HOME="$RUNNER_TEMP/engram-remote-keygen-home"
          KEYGEN_OUTPUT="$RUNNER_TEMP/engram-remote-keygen.txt"
          test ! -e "$REMOTE_PACKAGE"

          xcodebuild build \
            -project Engram.xcodeproj \
            -scheme EngramRemoteServer \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$REMOTE_DERIVED_DATA" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO

          bash scripts/package-remote-server.sh \
            --derived-data "$REMOTE_DERIVED_DATA" \
            --configuration Release \
            --arch arm64 \
            --source-revision "$GITHUB_SHA" \
            --output "$REMOTE_PACKAGE"
          NO_XCODE_PATH="$RUNNER_TEMP/engram-remote-no-xcode"
          mkdir -m 0700 "$NO_XCODE_PATH"
          ln -s /usr/bin/false "$NO_XCODE_PATH/xcrun"
          PATH="$NO_XCODE_PATH:$PATH" \
            /bin/bash scripts/package-remote-server.sh --verify-only "$REMOTE_PACKAGE"

          mkdir -m 0700 "$KEYGEN_HOME"
          trap 'rm -f "$KEYGEN_OUTPUT"' EXIT
          env -i \
            HOME="$KEYGEN_HOME" \
            PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            "$REMOTE_PACKAGE/bin/EngramRemoteServer" keygen > "$KEYGEN_OUTPUT"
          test "$(
            /usr/bin/openssl base64 -d -A < "$KEYGEN_OUTPUT" |
              /usr/bin/wc -c |
              /usr/bin/tr -d '[:space:]'
          )" = 32

  ui-test-smoke:
    runs-on: macos-15
    needs: changes
    if: needs.changes.outputs.heavy == 'true' && github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Set screenshots dir
        run: echo "SCREENSHOTS_DIR=$RUNNER_TEMP/screenshots" >> "$GITHUB_ENV"
      - name: Install Git LFS
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install git-lfs
          git lfs version
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          lfs: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-${{ hashFiles('macos/project.yml', 'macos/Engram.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-
      - run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"
      - run: cd macos && xcodegen generate
      - run: npm run generate:fixtures
      - name: Dismiss macOS setup assistant
        run: |
          osascript -e 'tell application id "com.apple.SetupAssistant" to quit' || true
          pkill -x "Setup Assistant" || true
      - name: Run UI smoke tests
        run: |
          xcodebuild test \
            -project macos/Engram.xcodeproj \
            -scheme Engram \
            -only-testing:EngramUITests/HomeSmokeTests \
            -only-testing:EngramUITests/SessionsSmokeTests \
            -only-testing:EngramUITests/SessionDetailSmokeTests \
            -only-testing:EngramUITests/SearchSmokeTests \
            -only-testing:EngramUITests/NavigationSmokeTests \
            -only-testing:EngramUITests/PopoverSmokeTests \
            -only-testing:EngramUITests/ActivitySmokeTests \
            -destination 'platform=macOS' \
            -resultBundlePath ${{ runner.temp }}/ui-test-results \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM=""
      - name: Collect screenshots from sandbox
        if: always()
        run: |
          # XCUITest runner writes to sandbox temp dir — find and copy to known location
          SANDBOX_DIR="$HOME/Library/Containers/com.engram.EngramUITests.xctrunner/Data/tmp/engram-screenshots"
          mkdir -p "$SCREENSHOTS_DIR"
          if [ -d "$SANDBOX_DIR" ]; then
            cp -R "$SANDBOX_DIR"/* "$SCREENSHOTS_DIR"/ 2>/dev/null || true
          fi
      - name: Compare screenshots
        if: always()
        env:
          SCREENSHOTS_DIR: ${{ runner.temp }}/screenshots
          SCREENSHOT_REQUIRE_MANIFEST: "1"
          SCREENSHOT_FAIL_ON_SIZE_MISMATCH: "1"
        run: npx tsx scripts/screenshot-compare.ts
      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshot-diffs
          path: |
            ${{ runner.temp }}/screenshots/*.png
            ${{ runner.temp }}/screenshots/diffs/
            ${{ runner.temp }}/screenshots/comparison-report.json
          retention-days: 14
  ui-test-full:
    runs-on: macos-15
    needs: changes
    if: needs.changes.outputs.heavy == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - name: Set screenshots dir
        run: echo "SCREENSHOTS_DIR=$RUNNER_TEMP/screenshots" >> "$GITHUB_ENV"
      - name: Install Git LFS
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install git-lfs
          git lfs version
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          lfs: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-${{ hashFiles('macos/project.yml', 'macos/Engram.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-
      - run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"
      - run: cd macos && xcodegen generate
      - run: npm run generate:fixtures
      - name: Dismiss macOS setup assistant
        run: |
          osascript -e 'tell application id "com.apple.SetupAssistant" to quit' || true
          pkill -x "Setup Assistant" || true
      - name: Run full UI test suite
        run: |
          xcodebuild test \
            -project macos/Engram.xcodeproj \
            -scheme Engram \
            -only-testing:EngramUITests \
            -destination 'platform=macOS' \
            -resultBundlePath ${{ runner.temp }}/ui-test-results \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM=""
      - name: Collect screenshots from sandbox
        if: always()
        run: |
          SANDBOX_DIR="$HOME/Library/Containers/com.engram.EngramUITests.xctrunner/Data/tmp/engram-screenshots"
          mkdir -p "$SCREENSHOTS_DIR"
          if [ -d "$SANDBOX_DIR" ]; then
            cp -R "$SANDBOX_DIR"/* "$SCREENSHOTS_DIR"/ 2>/dev/null || true
          fi
      - name: Compare screenshots
        if: always()
        env:
          SCREENSHOTS_DIR: ${{ runner.temp }}/screenshots
          SCREENSHOT_REQUIRE_MANIFEST: "1"
          SCREENSHOT_FAIL_ON_SIZE_MISMATCH: "1"
        run: npx tsx scripts/screenshot-compare.ts
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: screenshot-diffs-full
          path: |
            ${{ runner.temp }}/screenshots/*.png
            ${{ runner.temp }}/screenshots/diffs/
            ${{ runner.temp }}/screenshots/comparison-report.json
          retention-days: 30

  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - changes
      - typescript
      - macos-vitest
      - swift-unit
      - remote-server-swift
      - ui-test-smoke
      - ui-test-full
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      CHANGES: ${{ needs.changes.result }}
      HEAVY: ${{ needs.changes.outputs.heavy }}
      TYPESCRIPT: ${{ needs.typescript.result }}
      MACOS_GATES: ${{ needs.macos-vitest.result }}
      SWIFT_UNIT: ${{ needs.swift-unit.result }}
      REMOTE_SERVER: ${{ needs.remote-server-swift.result }}
      UI_SMOKE: ${{ needs.ui-test-smoke.result }}
      UI_FULL: ${{ needs.ui-test-full.result }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify expected CI results
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          bash scripts/ci/verify-test-gate.sh \
            "$CHANGES" "$HEAVY" \
            "$TYPESCRIPT" "$MACOS_GATES" "$SWIFT_UNIT" "$REMOTE_SERVER" \
            "$UI_SMOKE" "$UI_FULL" "$EVENT_NAME"

  ui-smoke-report:
    name: Report UI smoke failure
    needs: ui-test-smoke
    if: always() && github.event_name == 'pull_request' && needs.ui-test-smoke.result == 'failure'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Download screenshot report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: screenshot-diffs
          path: screenshot-diffs
      - name: Comment on PR
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          SCREENSHOTS_DIR: screenshot-diffs
        with:
          script: |
            const fs = require('fs');
            const reportPath = `${process.env.SCREENSHOTS_DIR}/comparison-report.json`;
            if (!fs.existsSync(reportPath)) return;
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const failures = report.results.filter(r => r.status !== 'passed');
            if (failures.length === 0) return;
            let body = `📸 **Screenshot Regression**: ${failures.length} failure(s)\n\n`;
            body += `| Screen | SSIM | Pixel Diff | AI | Status |\n|--------|------|------------|-----|--------|\n`;
            for (const f of failures) {
              let aiCol = '—';
              if (f.ai_triage) {
                const icon = f.ai_triage.verdict === 'acceptable' ? '✅' : f.ai_triage.verdict === 'regression' ? '❌' : '⚠️';
                aiCol = `${icon} ${f.ai_triage.verdict} (${f.ai_triage.confidence.toFixed(2)})`;
              }
              body += `| ${f.name} | ${f.metrics.ssim.toFixed(3)} | ${f.metrics.pixel_diff_percent.toFixed(2)}% | ${aiCol} | ❌ |\n`;
            }
            body += `\nView diff images in [artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
