name: Perf

on:
  schedule:
    - cron: "30 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: perf-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  XCODEGEN_VERSION: "2.45.4"

jobs:
  indexer-throughput:
    runs-on: [self-hosted, macOS, macmini-m1, xcode]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Cache Homebrew (xcodegen)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Cache SPM packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Caches/EngramSourcePackages
          key: spm-${{ runner.os }}-${{ runner.arch }}-selfhost-xcode-${{ hashFiles('macos/project.yml', 'macos/Engram.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ runner.arch }}-selfhost-xcode-

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Generate test fixtures
        run: npm run generate:fixtures

      - name: Build Swift indexer perf test
        id: perf_build
        run: |
          set +e
          set -o pipefail
          xcodebuild build-for-testing \
            -project macos/Engram.xcodeproj \
            -scheme EngramCoreTests \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/engram-perf-derived-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/EngramSourcePackages" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee perf-build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Swift indexer perf test without Xcode test-manager IPC
        id: perf_test
        if: steps.perf_build.outputs.exit_code == '0'
        env:
          ENGRAM_PERF: "1"
        run: |
          set +e
          set -o pipefail
          bundle="$RUNNER_TEMP/engram-perf-derived-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/Build/Products/Debug/EngramCoreTests.xctest"
          xcrun xctest -XCTest IndexerPerformanceTests "$bundle" \
            2>&1 | tee perf-xctest.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Enforce perf budget
        if: always()
        run: |
          python3 scripts/ci/check-perf-results.py \
            --log perf-xctest.log \
            --results perf-results.json \
            --max-average-seconds 0.100 \
            --max-rsd-percent 10.0 \
            --build-exit-code "${{ steps.perf_build.outputs.exit_code || '125' }}" \
            --test-exit-code "${{ steps.perf_test.outputs.exit_code || '125' }}" \
            --fixture-root test-fixtures/sessions/generated \
            --expected-fixture-count 20 \
            --baseline-id run-29206691519-macmini-m1-xcode26.6 \
            --baseline-average-seconds 0.047 \
            --git-sha "$GITHUB_SHA" \
            --runner-name "$RUNNER_NAME" \
            --runner-os "$RUNNER_OS" \
            --runner-arch "$RUNNER_ARCH" \
            --xcode-version "$(xcodebuild -version | tr '\n' ' ')" \
            --sdk-version "$(xcrun --sdk macosx --show-sdk-version)"

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: indexer-perf-results
          path: |
            perf-results.json
            perf-build.log
            perf-xctest.log
          retention-days: 90
