name: Perf

on:
  schedule:
    - cron: "30 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  XCODEGEN_VERSION: "2.45.4"

jobs:
  indexer-throughput:
    runs-on: [self-hosted, macOS, macmini-m1, xcode]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Cache Homebrew (xcodegen)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Cache SPM packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Caches/EngramSourcePackages
          key: spm-${{ runner.os }}-${{ runner.arch }}-selfhost-xcode-${{ hashFiles('macos/project.yml', 'macos/Engram.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ runner.arch }}-selfhost-xcode-

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Generate test fixtures
        run: npm run generate:fixtures

      - name: Run Swift indexer perf test
        env:
          ENGRAM_PERF: "1"
        run: |
          set -o pipefail
          xcodebuild test \
            -project macos/Engram.xcodeproj \
            -scheme EngramCoreTests \
            -only-testing:EngramCoreTests/IndexerPerformanceTests \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/engram-perf-derived-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -clonedSourcePackagesDirPath "$HOME/Library/Caches/EngramSourcePackages" \
            CODE_SIGNING_ALLOWED=NO \
            TEST_RUNNER_ENGRAM_PERF=1 \
            2>&1 | tee perf-xcodebuild.log

      - name: Enforce perf budget
        if: always()
        run: |
          python3 scripts/ci/check-perf-results.py \
            --log perf-xcodebuild.log \
            --results perf-results.json \
            --max-average-seconds 0.250

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: indexer-perf-results
          path: |
            perf-results.json
            perf-xcodebuild.log
          retention-days: 90
