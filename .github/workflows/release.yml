name: Release Gate

# Tag-gated release verification. Runs on v* tags after release tests pass.
# We cannot notarize in CI (no Apple secrets), so this lane builds + exports with
# an ad-hoc identity and runs the IDENTITY-INDEPENDENT checks from
# macos/scripts/release-verify.sh:
#   - bundle hygiene (no node / node_modules / dist / daemon.js / index.js / web.js)
#   - structural sanity (Engram + EngramMCP + EngramService present)
#   - non-default version
#   - codesign --verify --deep --strict
# This catches release-packaging defects (REL-C2 / REL-H bundle hygiene) before a tag ships.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  XCODEGEN_VERSION: "2.45.4"

jobs:
  validate-release-tag:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require a stable semantic-version tag
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || {
            echo "Release tags must match vMAJOR.MINOR.PATCH; got '$GITHUB_REF_NAME'" >&2
            exit 1
          }

  release-tests:
    needs: validate-release-tag
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install xcodegen and archive safety tools
        run: |
          brew install xcodegen ripgrep
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-${{ hashFiles('macos/project.yml', 'macos/Engram.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ runner.arch }}-xcode15-

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Build fixtures and run TypeScript tests
        run: |
          npm ci
          npm run build
          npm run typecheck:test
          npm run generate:fixtures
          npm run test:coverage

      - name: Run Swift release unit tests
        run: |
          cd macos

          run_xcode_tests() {
            local scheme="$1"
            shift
            local log="xcodebuild-${scheme}.log"
            xcodebuild test \
              -project Engram.xcodeproj \
              -scheme "$scheme" \
              -destination 'platform=macOS' \
              CODE_SIGNING_ALLOWED=NO \
              "$@" \
              2>&1 | tee "$log"
            grep -Fq '** TEST SUCCEEDED **' "$log"
          }

          run_xcode_tests Engram -skip-testing:EngramUITests
          run_xcode_tests EngramServiceCore
          run_xcode_tests EngramMCPTests

  release-remote-server-tests:
    needs: validate-release-tag
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Run remote server unit tests
        run: |
          cd macos
          xcodebuild test \
            -project Engram.xcodeproj \
            -scheme EngramRemoteServerCore \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/engram-remote-tests-derived" \
            CODE_SIGNING_ALLOWED=NO

  release-bundle-gate:
    runs-on: [self-hosted, macOS, macmini-m1, xcode]
    needs: [release-tests, release-remote-server-tests]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ runner.arch }}-selfhost-xcode-${{ hashFiles('macos/project.yml', 'macos/Engram.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ runner.arch }}-selfhost-xcode-

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Build test fixtures (needed by the project's resource phases)
        run: |
          npm ci
          npm run build
          npm run generate:fixtures

      - name: Archive (ad-hoc identity)
        run: |
          cd macos
          xcodebuild archive \
            -project Engram.xcodeproj \
            -scheme Engram \
            -configuration Release \
            -archivePath build/Engram.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export ad-hoc app from archive
        run: |
          cd macos
          # Pull the app out of the archive directly. A developer-id exportArchive
          # needs a real cert, which CI does not have; the archived app is already
          # ad-hoc signed and is sufficient for identity-independent verification.
          mkdir -p build/EngramExport
          ditto build/Engram.xcarchive/Products/Applications/Engram.app \
                build/EngramExport/Engram.app

      - name: Run release-verify (ad-hoc, identity-independent checks)
        run: |
          cd macos
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/release-verify.sh build/EngramExport/Engram.app \
            --adhoc \
            --expected-build "${{ github.run_number }}" \
            --expected-short-version "$TAG_VERSION"

      - name: Record release gate scope
        if: always()
        run: |
          {
            echo "### Release gate scope"
            echo "This ad-hoc package gate is not a signed or notarized distribution approval."
            echo "A distributable build still requires Developer ID export, notarization, stapling, and full release verification."
          } >> "$GITHUB_STEP_SUMMARY"
