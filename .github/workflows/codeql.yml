name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '34 3 * * 1'

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  XCODEGEN_VERSION: "2.45.4"

jobs:
  typescript:
    name: CodeQL TypeScript
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  swift:
    name: CodeQL Swift
    runs-on: [self-hosted, macOS, macmini-m1, xcode]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install xcodegen
        run: |
          brew install xcodegen
          test "$(xcodegen --version)" = "Version: $XCODEGEN_VERSION"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Generate project resources
        run: |
          npm ci
          npm run build
          npm run generate:fixtures
          cd macos
          xcodegen generate

      - name: Build Swift product
        run: |
          cd macos
          xcodebuild build \
            -project Engram.xcodeproj \
            -scheme Engram \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Analyze
        uses: github/codeql-action/analyze@v4
